<!DOCTYPE html>
<html>
<head>
    <title>Stress Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #ffd6e8, #e6d6ff, #c7f5e0);
            min-height: 100vh;
        }
        .container {
            width: 560px;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        h1 { text-align: center; color: #b26ad6; }
        h2 { text-align: center; color: #5a7d7c; }
        input, select, textarea {
            width: 100%; padding: 11px; margin: 8px 0; border-radius: 8px;
            border: 1px solid #ddd; font-size: 14px; background: #fafafa; box-sizing: border-box;
        }
        textarea { height: 60px; }
        button, .btn {
            display: block; width: 100%; padding: 13px; margin-top: 12px;
            border: none; border-radius: 10px; font-size: 16px; cursor: pointer;
            background: linear-gradient(45deg, #ffb6d9, #cdb4ff, #a8f0d3);
            color: #333; font-weight: 600; text-align: center; text-decoration: none; box-sizing: border-box;
        }
        button:hover, .btn:hover { transform: scale(1.03); }
        .links { text-align: center; margin-top: 15px; }
        .links a { color: #b26ad6; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
